name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "README.md"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Lint
        run: uv run ruff check src pipelines tests

      - name: Test
        run: uv run pytest -q

      - name: Build API Docker image
        run: docker build -f Dockerfile.api -t regression-mlops-e2e-api:ci .
