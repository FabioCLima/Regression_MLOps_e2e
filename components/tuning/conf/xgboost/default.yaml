# Standard search space — fast, suitable for iterative experimentation
search_space:
  n_estimators:
    low: 100
    high: 500
  max_depth:
    low: 3
    high: 8
  learning_rate:
    low: 0.01
    high: 0.3
    log: true
  subsample:
    low: 0.6
    high: 1.0
  colsample_bytree:
    low: 0.6
    high: 1.0
