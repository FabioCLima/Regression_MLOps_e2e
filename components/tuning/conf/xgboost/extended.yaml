# Extended search space — deeper exploration, more trials needed (set n_trials >= 50)
search_space:
  n_estimators:
    low: 200
    high: 1000
  max_depth:
    low: 3
    high: 12
  learning_rate:
    low: 0.001
    high: 0.3
    log: true
  subsample:
    low: 0.5
    high: 1.0
  colsample_bytree:
    low: 0.4
    high: 1.0
  min_child_weight:
    low: 1
    high: 10
  reg_alpha:
    low: 0.0
    high: 1.0
  reg_lambda:
    low: 0.5
    high: 5.0
